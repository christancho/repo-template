name: Move Done issues to In Staging when dev→stg PR opens

on:
  pull_request:
    types: [opened]
    branches:
      - stg

jobs:
  move-to-in-staging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Find all Done items in GitHub Projects
        id: done_items
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          CONFIG=".github/project-config.json"
          OWNER="${{ github.repository_owner }}"
          PROJECT_NUMBER="${{ vars.PROJECT_NUMBER }}"
          DONE_OPTION_ID=$(jq -r '.options["Done"]' "$CONFIG")

          ITEM_IDS=$(gh api graphql -f query="
          {
            user(login: \"$OWNER\") {
              projectV2(number: $PROJECT_NUMBER) {
                items(first: 100) {
                  nodes {
                    id
                    fieldValues(first: 20) {
                      nodes {
                        ... on ProjectV2ItemFieldSingleSelectValue {
                          optionId
                          field { ... on ProjectV2SingleSelectField { name } }
                        }
                      }
                    }
                  }
                }
              }
            }
          }" --jq "[.data.user.projectV2.items.nodes[] | select(.fieldValues.nodes[] | select(.field.name == \"Status\") | .optionId == \"$DONE_OPTION_ID\") | .id] | join(\" \")")
          echo "item_ids=$ITEM_IDS" >> "$GITHUB_OUTPUT"

      - name: Move Done items to In Staging
        if: steps.done_items.outputs.item_ids != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          CONFIG=".github/project-config.json"
          PROJECT_NODE_ID=$(jq -r '.project_node_id' "$CONFIG")
          STATUS_FIELD_ID=$(jq -r '.status_field_id' "$CONFIG")
          IN_STAGING_OPTION_ID=$(jq -r '.options["In Staging"]' "$CONFIG")

          for ITEM_ID in ${{ steps.done_items.outputs.item_ids }}; do
            gh api graphql -f query="
            mutation {
              updateProjectV2ItemFieldValue(input: {
                projectId: \"$PROJECT_NODE_ID\"
                itemId: \"$ITEM_ID\"
                fieldId: \"$STATUS_FIELD_ID\"
                value: { singleSelectOptionId: \"$IN_STAGING_OPTION_ID\" }
              }) {
                projectV2Item { id }
              }
            }" > /dev/null
            echo "Moved item $ITEM_ID to In Staging"
          done
